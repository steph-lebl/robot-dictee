<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Voix françaises disponibles</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px 12px; text-align: left; }
    th { background: #eee; }
    button { margin: 5px; padding: 8px 16px; cursor: pointer; }
    .highlight { background: #d4edda; }
  </style>
</head>
<body>
  <h1>Voix françaises disponibles sur ce navigateur</h1>
  <p id="status">Chargement des voix...</p>
  <table id="voices-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Lang</th>
        <th>Local</th>
        <th>Default</th>
        <th>Test</th>
      </tr>
    </thead>
    <tbody id="voices-body"></tbody>
  </table>

  <script>
    var testPhrase = "Bonjour, aujourd'hui nous allons pratiquer la dictée.";

    function listVoices() {
      var voices = speechSynthesis.getVoices();
      var frVoices = voices.filter(function(v) {
        return v.lang.startsWith('fr');
      });

      if (frVoices.length === 0) {
        document.getElementById('status').textContent =
          'Aucune voix française trouvée. Total voix: ' + voices.length;
        return;
      }

      document.getElementById('status').textContent =
        frVoices.length + ' voix française(s) trouvée(s) sur ' + voices.length + ' au total.';
      document.getElementById('voices-table').style.display = '';

      var tbody = document.getElementById('voices-body');
      tbody.innerHTML = '';

      frVoices.forEach(function(voice, i) {
        var tr = document.createElement('tr');
        if (voice.lang === 'fr-CA') tr.className = 'highlight';

        tr.innerHTML =
          '<td>' + (i + 1) + '</td>' +
          '<td>' + voice.name + '</td>' +
          '<td>' + voice.lang + '</td>' +
          '<td>' + (voice.localService ? 'Oui' : 'Non') + '</td>' +
          '<td>' + (voice.default ? 'Oui' : 'Non') + '</td>' +
          '<td><button data-index="' + i + '">Tester</button></td>';

        tr.querySelector('button').addEventListener('click', function() {
          speechSynthesis.cancel();
          var msg = new SpeechSynthesisUtterance(testPhrase);
          msg.voice = frVoices[i];
          msg.lang = frVoices[i].lang;
          msg.rate = 0.6;
          speechSynthesis.speak(msg);
        });

        tbody.appendChild(tr);
      });
    }

    speechSynthesis.onvoiceschanged = listVoices;
    listVoices();
  </script>
</body>
</html>
